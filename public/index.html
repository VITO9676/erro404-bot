<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERRO404 - Sniper</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .radar { border: 2px solid #ff0000; width: 200px; height: 200px; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .line { position: absolute; width: 50%; height: 2px; background: #ff0000; left: 50%; transform-origin: left; animation: scan 3s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        h1 { color: #ff0000; font-size: 3rem; margin: 0; }
        button { background: #ff0000; color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 10px; width: 80%; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>ERRO404</h1>
    <p>BUSCANDO LIQUIDEZ...</p>
    <div class="radar"><div class="line"></div><span>BTC/USD</span></div>
    <button onclick="window.location.href='/login'">ENTRAR NO PAINEL</button>
</body>
</html>
