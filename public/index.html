<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>ERRO404 Painel</title><style>:root{--bg:#0d1117;--card:#161b22;--accent:#f85149;--text:#c9d1d9;--success:#238636}body{background:var(--bg);color:var(--text);font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:var(--card);padding:2rem;border-radius:12px;width:380px;text-align:center;border:1px solid #30363d;box-shadow:0 10px 30px rgba(0,0,0,0.5)}h1{color:var(--accent);margin:0 0 1rem 0;letter-spacing:2px}.badge{padding:6px 16px;border-radius:20px;font-weight:bold;font-size:.8rem;display:inline-block;margin-bottom:1.5rem}.on{background:var(--success);color:white}.off{background:#30363d;color:#8b949e}input{width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;color:white;border-radius:6px;box-sizing:border-box;margin-bottom:1rem;font-size:1rem}button{width:100%;padding:14px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:1rem;transition:.2s}.btn-main{background:var(--accent);color:white}.btn-main:hover{opacity:.9}.log-box{background:#000;padding:10px;border-radius:6px;margin-top:1.5rem;height:120px;overflow-y:auto;font-family:monospace;font-size:.75rem;text-align:left;border:1px solid #30363d}.log-entry{margin-bottom:4px;color:#58a6ff}</style></head><body><div class="container"><h1>ERRO404 BOT</h1><div id="status" class="badge off">PARADO</div><label style="display:block;text-align:left;margin-bottom:5px;font-size:.8rem;color:#8b949e">Valor da Entrada (R$)</label><input type="number" id="amount" value="5000"><button id="toggleBtn" class="btn-main" onclick="toggle()">INICIAR OPERAÇÕES</button><div class="log-box" id="logs"><div class="log-entry">> Sistema pronto. Aguardando comando...</div></div></div><script>let active=false;async function load(){const r=await fetch('/api/settings');const d=await r.json();active=d.isActive;document.getElementById('amount').value=d.amount;updateUI()}function updateUI(){const s=document.getElementById('status');const b=document.getElementById('toggleBtn');if(active){s.innerText='OPERANDO';s.className='badge on';b.innerText='PARAR ROBÔ';b.style.background='#30363d';addLog('> Robô iniciado. Monitorando BTC/USD...')}else{s.innerText='PARADO';s.className='badge off';b.innerText='INICIAR OPERAÇÕES';b.style.background='#f85149'}}async function toggle(){active=!active;const amt=document.getElementById('amount').value;await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({isActive:active,amount:amt})});updateUI()}function addLog(msg){const l=document.getElementById('logs');const d=document.createElement('div');d.className='log-entry';d.innerText=msg;l.appendChild(d);l.scrollTop=l.scrollHeight}load()</script></body></html>
