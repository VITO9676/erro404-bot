<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>ERRO404 Dashboard Sniper</title><style>:root{--bg:#0d1117;--card:#161b22;--accent:#f85149;--text:#c9d1d9;--success:#238636;--border:#30363d}body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}.app-container{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,0.6);margin:20px}h1{color:var(--accent);text-align:center;font-size:24px;letter-spacing:2px;margin-bottom:30px}#login-screen,#register-screen{display:block}#dashboard{display:none}input,select{width:100%;padding:14px;background:var(--bg);border:1px solid var(--border);color:white;border-radius:8px;margin-bottom:15px;box-sizing:border-box;font-size:16px}button{width:100%;padding:14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:16px;transition:.2s;margin-bottom:10px}.btn-main{background:var(--accent);color:white}.btn-secondary{background:var(--border);color:var(--text)}button:active{transform:scale(.98)}.status-badge{text-align:center;padding:8px;border-radius:20px;font-weight:bold;font-size:14px;margin-bottom:20px}.status-on{background:rgba(35,134,54,.2);color:#3fb950;border:1px solid #238636}.status-off{background:rgba(248,81,73,.2);color:#f85149;border:1px solid #f85149}.config-group{margin-bottom:20px;text-align:left}label{display:block;margin-bottom:8px;font-size:13px;color:#8b949e}.radar-box{height:150px;background:#000;border-radius:12px;margin-bottom:20px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;justify-content:center;align-items:center;flex-direction:column}.scanning-line{width:100%;height:2px;background:var(--accent);position:absolute;top:0;animation:scan 2s linear infinite;box-shadow:0 0 15px var(--accent);display:none}@keyframes scan{0%{top:0}100%{top:100%}}.pulse{animation:pulse-anim 1.5s ease-in-out infinite}@keyframes pulse-anim{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}</style></head><body><div class="app-container"><h1>ERRO404</h1><div id="login-screen"><input type="email" id="login-email" placeholder="E-mail"><input type="password" id="login-pass" placeholder="Senha"><button class="btn-main" onclick="handleLogin()">ENTRAR</button><button class="btn-secondary" onclick="showRegister()">CRIAR CONTA</button></div><div id="register-screen" style="display:none"><input type="text" id="reg-name" placeholder="Nome Completo"><input type="email" id="reg-email" placeholder="E-mail"><input type="text" id="reg-phone" placeholder="WhatsApp DDD+Numero"><button class="btn-main" onclick="handleRegister()">SOLICITAR ACESSO</button><button class="btn-secondary" onclick="showLogin()">VOLTAR</button></div><div id="dashboard"><div id="status-display" class="status-badge status-off">SISTEMA DESLIGADO</div><div class="radar-box" id="radar"><div id="scan-line" class="scanning-line"></div><div id="radar-text" class="pulse">AGUARDANDO START...</div></div><div class="config-group"><div style="display:flex;gap:10px"><div style="flex:1"><label>Ativo</label><select id="asset"><option value="BTC/USD">BTC/USD</option><option value="ETH/USD">ETH/USD</option><option value="USD/JPY">USD/JPY</option></select></div><div style="flex:1"><label>Timeframe</label><select id="timeframe"><option value="M1">M1 (1 min)</option><option value="M5" selected>M5 (5 min)</option></select></div></div><label>Valor da Entrada R$</label><input type="number" id="amount" value="5000"><div style="display:flex;gap:10px"><div style="flex:1"><label>Stop Win</label><input type="number" id="stopWin" placeholder="R$ 0.00"></div><div style="flex:1"><label>Stop Loss</label><input type="number" id="stopLoss" placeholder="R$ 0.00"></div></div></div><button id="toggleBtn" class="btn-main" onclick="toggleBot()">INICIAR SNIPER</button></div></div><script>let active=false;function handleLogin(){const e=document.getElementById('login-email').value;const p=document.getElementById('login-pass').value;if(e==='importante.9676@gmail.com'&&p==='Deusefiel1996'){document.getElementById('login-screen').style.display='none';document.getElementById('dashboard').style.display='block';loadSettings()}else{alert('Acesso negado. Valide sua conta com o Joao Vitor.')}}function showRegister(){document.getElementById('login-screen').style.display='none';document.getElementById('register-screen').style.display='block'}function showLogin(){document.getElementById('register-screen').style.display='none';document.getElementById('login-screen').style.display='block'}async function handleRegister(){const d={name:document.getElementById('reg-name').value,email:document.getElementById('reg-email').value,phone:document.getElementById('reg-phone').value};const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});const res=await r.json();window.location.href=res.whatsappUrl}async function loadSettings(){const r=await fetch('/api/settings');const d=await r.json();active=d.isActive;document.getElementById('amount').value=d.amount;document.getElementById('asset').value=d.asset;document.getElementById('timeframe').value=d.timeframe;updateUI()}function updateUI(){const s=document.getElementById('status-display');const b=document.getElementById('toggleBtn');const rt=document.getElementById('radar-text');const sl=document.getElementById('scan-line');if(active){s.innerText='MONITORANDO MERCADO';s.className='status-badge status-on';b.innerText='PARAR OPERACOES';b.style.background='#30363d';rt.innerText='PROCURANDO OPORTUNIDADE...';sl.style.display='block';if(window.navigator.vibrate)window.navigator.vibrate(50)}else{s.innerText='SISTEMA DESLIGADO';s.className='status-badge status-off';b.innerText='INICIAR SNIPER';b.style.background='#f85149';rt.innerText='AGUARDANDO START...';sl.style.display='none'}}async function toggleBot(){active=!active;const c={isActive:active,amount:document.getElementById('amount').value,asset:document.getElementById('asset').value,timeframe:document.getElementById('timeframe').value,stopWin:document.getElementById('stopWin').value,stopLoss:document.getElementById('stopLoss').value};await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});updateUI()}setInterval(async()=>{if(active){const r=await fetch('/api/signal');const sig=await r.json();if(sig.asset){document.getElementById('radar-text').innerHTML='<span style="color:#3fb950">SINAL DETECTADO!</span><br>'+sig.asset+' - '+sig.type;if(window.navigator.vibrate)window.navigator.vibrate([100,50,100])}}},5000);</script></body></html>
